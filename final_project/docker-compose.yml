version: '3.8'
services:
  database_node:
    image: mongo:6.0
    container_name: hiresense_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend_engine:
    image: python:3.10-slim
    container_name: hiresense_api
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/backend
    working_dir: /backend
    env_file:
      - ./backend/.env
    depends_on:
      - database_node

  frontend_app:
    image: node:20-slim
    container_name: hiresense_web
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    working_dir: /app
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend_engine

volumes:
  mongo_data:
